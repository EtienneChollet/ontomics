[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "npm", "homebrew"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Where to host releases
hosting = "github"
# Whether to install an updater program
install-updater = true
# npm scope for the npm installer (change before first publish)
npm-scope = "@ontomics"
# Only run plan on PRs (save CI minutes)
pr-run-mode = "plan"
# Publish npm package to registry (requires NPM_TOKEN secret in GitHub)
publish-jobs = ["npm", "homebrew"]
# Homebrew tap repo for `brew install EtienneChollet/tap/ontomics`
tap = "EtienneChollet/homebrew-tap"
# Run setup script inside containers before building
github-build-setup = "build-setup.yml"

# Build Linux binaries in older-glibc container for broad compatibility
[dist.github-custom-runners.x86_64-unknown-linux-gnu]
container = { image = "quay.io/pypa/manylinux_2_28_x86_64", host = "x86_64-unknown-linux-gnu" }
